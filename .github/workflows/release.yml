name: release

on:
  push:
    tags: ["v*.*.*"]

# Cross-compiled cgo is painful. We run each target on a native runner so the
# C toolchain and the tree-sitter grammars link cleanly:
#
#   linux/amd64 and linux/arm64 -> ubuntu-latest + cross toolchain
#   darwin/amd64 and darwin/arm64 -> macos-latest (native arm64 runner)
#   windows/amd64 -> windows-latest with MSYS2 gcc
#
# Linux arm64 cross-compile uses the aarch64-linux-gnu toolchain. A musl
# static binary target can be added later if we find glibc portability
# issues with release tarballs.
#
# Each tarball/zip bundles the matching sqlite-vec shared library at
# `myco-<suffix>/lib/vec0.<ext>`. `internal/index.DefaultExtensionPath`
# auto-discovers it, so release builds get the vec0 fast path with no
# extra config.
env:
  SQLITE_VEC_VERSION: v0.1.9
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            cc: gcc
            suffix: linux-amd64
            vec_asset: sqlite-vec-0.1.9-loadable-linux-x86_64.tar.gz
            vec_member: vec0.so
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            cc: aarch64-linux-gnu-gcc
            apt_packages: gcc-aarch64-linux-gnu
            suffix: linux-arm64
            vec_asset: sqlite-vec-0.1.9-loadable-linux-aarch64.tar.gz
            vec_member: vec0.so
          - os: macos-latest
            goos: darwin
            goarch: amd64
            cc: clang
            suffix: darwin-amd64
            vec_asset: sqlite-vec-0.1.9-loadable-macos-x86_64.tar.gz
            vec_member: vec0.dylib
          - os: macos-latest
            goos: darwin
            goarch: arm64
            cc: clang
            suffix: darwin-arm64
            vec_asset: sqlite-vec-0.1.9-loadable-macos-aarch64.tar.gz
            vec_member: vec0.dylib
          - os: windows-latest
            goos: windows
            goarch: amd64
            cc: gcc
            suffix: windows-amd64
            ext: .exe
            vec_asset: sqlite-vec-0.1.9-loadable-windows-x86_64.tar.gz
            vec_member: vec0.dll
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: install cross toolchain (linux/arm64)
        if: matrix.apt_packages != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.apt_packages }}

      - name: setup msys2 (windows)
        if: matrix.os == 'windows-latest'
        uses: msys2/setup-msys2@v2
        with:
          update: true
          install: mingw-w64-x86_64-gcc

      # Build the binary directly into the staging tree
      # (`dist/myco-<suffix>/myco`), so the binary path and the
      # staging-directory path are different from the start. An earlier
      # version of this workflow built to `dist/myco-<suffix>` (a file)
      # and later tried to mkdir `dist/myco-<suffix>/lib`, which failed
      # with "Not a directory" because the file was already there.
      - name: build
        env:
          CGO_ENABLED: "1"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CC: ${{ matrix.cc }}
        shell: bash
        run: |
          set -euo pipefail
          STAGE="dist/myco-${{ matrix.suffix }}"
          mkdir -p "${STAGE}/lib"
          VERSION="${GITHUB_REF#refs/tags/}"
          go build \
            -tags sqlite_fts5 \
            -trimpath \
            -ldflags "-s -w -X main.version=${VERSION}" \
            -o "${STAGE}/myco${{ matrix.ext }}" \
            ./cmd/myco

      # Pull the matching sqlite-vec asset and drop the loadable
      # library at `<stage>/lib/vec0.<ext>` so the binary's
      # DefaultExtensionPath helper finds it. We pin via the workflow-
      # level SQLITE_VEC_VERSION env var; bump there to upgrade.
      - name: fetch sqlite-vec
        shell: bash
        run: |
          set -euo pipefail
          STAGE="dist/myco-${{ matrix.suffix }}"
          WORK="dist/_vec"
          mkdir -p "${WORK}"
          ASSET="${{ matrix.vec_asset }}"
          MEMBER="${{ matrix.vec_member }}"
          URL="https://github.com/asg017/sqlite-vec/releases/download/${SQLITE_VEC_VERSION}/${ASSET}"
          echo "downloading ${URL}"
          curl -fsSL -o "${WORK}/${ASSET}" "${URL}"
          # All sqlite-vec loadable assets ship as .tar.gz, including
          # the Windows one. Git Bash on the windows-latest runner has
          # tar installed, so we don't need the 7z fallback.
          tar -xzf "${WORK}/${ASSET}" -C "${WORK}"
          # Find the loadable lib regardless of nesting in the asset.
          FOUND="$(find "${WORK}" -type f -name "${MEMBER}" | head -n 1)"
          if [ -z "${FOUND}" ]; then
            echo "could not find ${MEMBER} inside ${ASSET}" >&2
            ls -laR "${WORK}"
            exit 1
          fi
          cp "${FOUND}" "${STAGE}/lib/${MEMBER}"
          rm -rf "${WORK}"
          ls -la "${STAGE}" "${STAGE}/lib"

      - name: archive (unix)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          cd dist
          tar -czf "myco-${{ matrix.suffix }}.tar.gz" "myco-${{ matrix.suffix }}"

      - name: archive (windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          cd dist
          7z a "myco-${{ matrix.suffix }}.zip" "myco-${{ matrix.suffix }}"

      - uses: actions/upload-artifact@v4
        with:
          name: myco-${{ matrix.suffix }}
          path: |
            dist/myco-${{ matrix.suffix }}*.tar.gz
            dist/myco-${{ matrix.suffix }}*.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          gh release create "$VERSION" \
            --title "$VERSION" \
            --notes-file CHANGELOG.md \
            dist/myco-*.tar.gz dist/myco-*.zip
